<!DOCTYPE html>
<html class="scroll-smooth" dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>عبدالعزيز الأبلم للمحاماة والاستشارات القانونية</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #FBD070;
            --background: #2F3E46;
            --surface: #37474F;
            --on-surface: #FFFFFF;
            --on-primary: #2F3E46;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--background);
            color: var(--on-surface);
            line-height: 1.6;
        }
        
        h1, h2, h3, .serif-font {
            font-family: 'Noto Serif', serif;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        
        .btn-primary {
            background-color: var(--primary);
            color: var(--on-primary);
            padding: 1rem 2rem;
            border: none;
            border-radius: 0;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.3s ease;
        }
        
        .btn-primary:hover {
            filter: brightness(1.1);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 1rem 2rem;
            border-radius: 0;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background-color: var(--primary);
            color: var(--on-primary);
        }
        
        .section-padding {
            padding: 6rem 0;
        }
        
        .text-primary {
            color: var(--primary);
        }
        
        .bg-surface {
            background-color: var(--surface);
        }
        
        .grid {
            display: grid;
            gap: 2rem;
        }
        
        .grid-cols-1 { grid-template-columns: repeat(1, 1fr); }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        
        @media (min-width: 768px) {
            .md\:grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
            .md\:grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
            .md\:grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        }
        
        @media (min-width: 1024px) {
            .lg\:grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
            .lg\:grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
            .lg\:grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        }
        
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            background: rgba(47, 62, 70, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 5rem;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .logo {
            height: 3.5rem;
            width: auto;
            object-fit: contain;
        }
        
        .nav-links {
            display: none;
            gap: 2rem;
            align-items: center;
        }
        
        @media (min-width: 768px) {
            .nav-links {
                display: flex;
            }
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--primary);
        }
        
        .lang-switch {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(251, 208, 112, 0.3);
            color: var(--primary);
            background: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .lang-switch:hover {
            background-color: var(--primary);
            color: var(--on-primary);
        }
        
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 5rem;
            overflow: hidden;
        }
        
        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        
        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, var(--background), rgba(47, 62, 70, 0.8), transparent);
            z-index: 10;
        }
        
        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }
        
        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        
        .hero-text {
            max-width: 48rem;
        }
        
        .hero-title {
            font-size: clamp(3rem, 8vw, 4.5rem);
            font-weight: bold;
            line-height: 1.15;
            margin-bottom: 2rem;
        }
        
        .hero-subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
        }
        
        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            padding-top: 1rem;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            background: rgba(251, 208, 112, 0.1);
            border: 1px solid rgba(251, 208, 112, 0.2);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
        }
        
        .badge-dot {
            width: 0.5rem;
            height: 0.5rem;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .section-header {
            text-align: center;
            max-width: 48rem;
            margin: 0 auto 4rem;
        }
        
        .section-title {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }
        
        .section-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.125rem;
        }
        
        .service-card {
            padding: 2rem;
            background: var(--background);
            border: 1px solid rgba(251, 208, 112, 0.1);
            text-align: center;
            transition: border-color 0.3s ease;
        }
        
        .service-card:hover {
            border-color: rgba(251, 208, 112, 0.4);
        }
        
        .service-icon {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .service-text {
            font-weight: bold;
            color: white;
        }
        
        .contact-info {
            display: grid;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        
        .contact-icon {
            width: 3rem;
            height: 3rem;
            border: 1px solid rgba(251, 208, 112, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }
        
        .contact-details h4 {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 0.25rem;
        }
        
        .contact-details p {
            font-size: 1.125rem;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-size: 0.625rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 0.5rem;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: border-color 0.3s ease;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 6rem;
        }
        
        .form-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: filter 0.3s ease;
        }
        
        .form-submit:hover {
            filter: brightness(1.1);
        }
        
        .footer {
            background: var(--background);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4rem 0;
        }
        
        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            margin-bottom: 3rem;
        }
        
        .footer-logo {
            height: 4rem;
            width: auto;
            margin-bottom: 1.5rem;
        }
        
        .footer-description {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.875rem;
            line-height: 1.6;
        }
        
        .footer-title {
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .footer-links {
            list-style: none;
        }
        
        .footer-links li {
            margin-bottom: 1rem;
        }
        
        .footer-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }
        
        .footer-links a:hover {
            color: var(--primary);
        }
        
        .footer-bottom {
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        
        .copyright {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.3);
        }
        
        .footer-legal a {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer-legal a:hover {
            color: var(--primary);
        }
        
        .footer-legal {
            display: flex;
            gap: 2rem;
        }
        
        @media (max-width: 767px) {
            .hero-title {
                font-size: 2.5rem;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

        class App {
            constructor() {

                this.logoUrl = "https://lh3.googleusercontent.com/aida/ADBb0ug2d98s1M2O9BNNHaB4HFQxsb0Bf45yNcS7CJFQmyCmp3hX2lYaQejvENxNFv2ne7xeHZtompXveeH0d2PoaB3MoAk-0FVibMT8W92QMiK-yHmhIozdJ8VC7kSZp4kqOUQiv0NDbvKb1vC02wJschycLZB9Z5QOvUlmEUng1xu79R561GfbAav2el5BHRA1n0fJzSZYCRNDzrZjbMaFGuryEiad0NNc69QiL_wqGPRjstW2Zmbyc_TZZAvoUGxXRHviMHtikVzTyw";

            init() {
                this.render();
                this.attachEventListeners();
            }

            t(key) {
                const keys = key.split('.');
                let value = translations[this.language];
                for (const k of keys) {
                    value = value?.[k];
                }
                return value || key;
            }

            toggleLanguage() {
                this.language = this.language === 'ar' ? 'en' : 'ar';
                document.documentElement.dir = this.language === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = this.language;
                this.render();
            }

            createNavigation() {
                return `
                    <nav class="nav">
                        <div class="container">
                            <div class="nav-content">
                                <div class="logo-section">

                                </button>
                            </div>

            createContact() {

                    <section class="section-padding" id="contact">

                                <div style="padding: 3rem;">
                                    <div class="contact-info">
                                        <div class="contact-item">
                                            <div class="contact-icon">
                                                <span class="material-symbols-outlined">call</span>
                                            </div>
                                            <div class="contact-details">
                                                <h4>${this.language === 'ar' ? 'اتصل بنا' : 'Call Us'}</h4>
                                                <p>${this.t('contact.phone')}</p>
                                            </div>
                                        </div>
                                        
                                        <div class="contact-item">
                                            <div class="contact-icon">
                                                <span class="material-symbols-outlined">mail</span>
                                            </div>
                                            <div class="contact-details">
                                                <h4>${this.language === 'ar' ? 'البريد الإلكتروني' : 'Email Address'}</h4>
                                                <p>${this.t('contact.email')}</p>
                                            </div>
                                        </div>
                                        
                                        <div class="contact-item">
                                            <div class="contact-icon">
                                                <span class="material-symbols-outlined">location_on</span>
                                            </div>
                                            <div class="contact-details">
                                                <h4>${this.language === 'ar' ? 'الموقع' : 'Location'}</h4>
                                                <p>${this.t('contact.location')}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div style="padding: 3rem; background: rgba(47, 62, 70, 0.5);">
                                    <form onsubmit="app.handleFormSubmit(event)" style="display: grid; gap: 1.5rem;">
                                        <div class="grid grid-cols-1 md:grid-cols-2" style="gap: 1.5rem;">
                                            <div>
                                                <label for="contact-name" class="form-label">${this.t('contact.form.name')}</label>
                                                <input 
                                                    type="text" 
                                                    id="contact-name" 
                                                    name="name" 
                                                    class="form-input" 
                                                    placeholder="${this.t('contact.form.placeholders.name')}"
                                                    autocomplete="name"
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label for="contact-phone" class="form-label">${this.t('contact.form.phone')}</label>
                                                <input 
                                                    type="tel" 
                                                    id="contact-phone" 
                                                    name="phone" 
                                                    class="form-input" 
                                                    placeholder="${this.t('contact.form.placeholders.phone')}"
                                                    autocomplete="tel"
                                                    required
                                                />
                                            </div>
                                        </div>
                                        
                                        <div>
                                            <label for="contact-service" class="form-label">${this.t('contact.form.service')}</label>
                                            <select id="contact-service" name="service" class="form-select" autocomplete="off">
                                                ${this.t('contact.form.options').map(option => `
                                                    <option value="${option}">${option}</option>
                                                `).join('')}
                                            </select>
                                        </div>
                                        
                                        <div>
                                            <label for="contact-message" class="form-label">${this.t('contact.form.message')}</label>
                                            <textarea 
                                                id="contact-message" 
                                                name="message" 
                                                class="form-textarea" 
                                                rows="4"
                                                placeholder="${this.t('contact.form.placeholders.message')}"
                                                autocomplete="off"
                                                required
                                            ></textarea>
                                        </div>
                                        
                                        <button type="submit" class="form-submit">
                                            ${this.t('contact.form.submit')}

                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>
                `;
            }

            createFooter() {
                return `
                    <footer class="footer">
                        <div class="container">
                            <div class="footer-content">
                                <div>
                                    <img src="${this.logoUrl}" alt="Abdulaziz Alablam Logo" class="footer-logo">
                                    <p class="footer-description">${this.t('footer.description')}</p>

                                <div>
                                    <h3 class="footer-title">${this.t('footer.quickLinks')}</h3>
                                    <ul class="footer-links">
                                        ${Object.entries(this.t('nav')).map(([key, value]) => `

                                        `).join('')}

                                <div>
                                    <h3 class="footer-title">${this.t('footer.mainServices')}</h3>
                                    <ul class="footer-links">
                                        <li><a href="#">${this.language === 'ar' ? 'الدفاع الجنائي' : 'Criminal Law'}</a></li>
                                        <li><a href="#">${this.language === 'ar' ? 'الاستشارات التجارية' : 'Commercial Law'}</a></li>
                                        <li><a href="#">${this.language === 'ar' ? 'قضايا التعويضات' : 'Civil Cases'}</a></li>
                                        <li><a href="#">${this.language === 'ar' ? 'نزاعات العقارات' : 'Real Estate'}</a></li>
                                    </ul>
                                </div>
                                
                                <div>
                                    <h3 class="footer-title">${this.t('footer.businessHours')}</h3>
                                    <ul class="footer-links">
                                        <li>${this.t('footer.hours.weekdays')}</li>
                                        <li>${this.t('footer.hours.saturday')}</li>
                                    </ul>
                                </div>
                            </div>
                            
                            <div class="footer-bottom">
                                <p class="copyright">${this.t('footer.copyright')}</p>
                                <div class="footer-legal">

                                    <a href="#">Terms of Service</a>
                                </div>
                            </div>
                        </div>
                    </footer>
                `;
            }

            handleFormSubmit(event) {
                event.preventDefault();
                const formData = new FormData(event.target);
                const data = Object.fromEntries(formData);
                console.log('Form submitted:', data);
                alert(this.language === 'ar' ? 'تم إرسال طلبك بنجاح!' : 'Your request has been submitted successfully!');
                event.target.reset();
            }

            render() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    ${this.createNavigation()}
                    <main>
                        ${this.createHero()}
                        ${this.createServices()}
                        ${this.createContact()}
                    </main>
                    ${this.createFooter()}
                `;
            }

            attachEventListeners() {
                // Smooth scrolling for navigation links
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function (e) {
                        e.preventDefault();
                        const target = document.querySelector(this.getAttribute('href'));
                        if (target) {
                            target.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start'
                            });
                        }
                    });
                });

                // Update active navigation link on scroll
                window.addEventListener('scroll', () => {
                    const sections = document.querySelectorAll('section[id]');
                    const navLinks = document.querySelectorAll('.nav-link');
                    
                    let current = '';
                    sections.forEach(section => {
                        const sectionTop = section.offsetTop;
                        const sectionHeight = section.clientHeight;
                        if (scrollY >= (sectionTop - 100)) {
                            current = section.getAttribute('id');
                        }
                    });

                    navLinks.forEach(link => {
                        link.classList.remove('active');
                        if (link.getAttribute('href') === `#${current}`) {
                            link.classList.add('active');
                        }
                    });
                });
            }
        }

        // Initialize app
        const app = new App();
    </script>
</body>
</html>
