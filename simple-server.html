<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdulaziz Al-Ablam Lawyers & Legal Consultants</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        h1, h2, h3, .serif-font {
            font-family: 'Noto Serif', serif;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        function SimpleApp() {
            const [language, setLanguage] = useState('ar');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const translations = {
                ar: {
                    title: 'عبدالعزيز الأبلم',
                    subtitle: 'للمحاماة والاستشارات القانونية',
                    description: 'ضابط شرطة سابق في دبي، رئيس نيابة سابق، ومحامٍ ممارس بخبرة عميقة في القضايا الجنائية والمدنية.',
                    badge: 'خبرة قانونية تتجاوز 20 عاماً',
                    cta1: 'طلب استشارة قانونية',
                    cta2: 'استكشف خدماتنا',
                    nav: {
                        home: 'الرئيسية',
                        services: 'الخدمات',
                        expertise: 'الخبرات',
                        about: 'عن المكتب',
                        contact: 'اتصل بنا'
                    }
                },
                en: {
                    title: 'Abdulaziz Al-Ablam',
                    subtitle: 'Lawyers & Legal Consultants',
                    description: 'Former Dubai Police Officer, Former Chief Prosecutor, and practicing lawyer with deep expertise in criminal and civil cases.',
                    badge: 'Over 20 Years of Legal Expertise',
                    cta1: 'Request a Consultation',
                    cta2: 'Explore Our Services',
                    nav: {
                        home: 'Home',
                        services: 'Services',
                        expertise: 'Expertise',
                        about: 'About',
                        contact: 'Contact Us'
                    }
                }
            };

            const currentLang = translations[language];
            const isRTL = language === 'ar';

            const toggleLanguage = () => {
                const newLang = language === 'ar' ? 'en' : 'ar';
                setLanguage(newLang);
                document.documentElement.dir = newLang === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = newLang;
            };

            return React.createElement('div', {
                className: 'min-h-screen',
                style: { direction: isRTL ? 'rtl' : 'ltr' }
            }, [
                // Navigation
                React.createElement('nav', {
                    key: 'nav',
                    className: 'fixed top-0 w-full z-50 bg-white/90 backdrop-blur-xl shadow-sm'
                }, [
                    React.createElement('div', {
                        key: 'nav-content',
                        className: 'flex justify-between items-center max-w-7xl mx-auto px-8 h-20'
                    }, [
                        React.createElement('div', {
                            key: 'logo',
                            className: 'text-xl font-bold text-gray-900',
                            style: { fontFamily: 'serif' }
                        }, React.createElement('div', {
                            className: 'flex items-center gap-3'
                        }, [
                            React.createElement('img', {
                                key: 'logo-img',
                                src: 'https://i.ibb.co/7bQ2GqM/logo-01.png',
                                alt: 'Alablam Logo',
                                className: 'h-10 w-auto object-contain',
                                style: { maxHeight: '40px' }
                            }),
                            React.createElement('span', { key: 'title' }, currentLang.title)
                        ])),
                        
                        // Language Switcher
                        React.createElement('div', {
                            key: 'lang-switch',
                            className: 'flex items-center gap-4'
                        }, [
                            React.createElement('button', {
                                key: 'lang-btn',
                                onClick: toggleLanguage,
                                className: 'flex items-center gap-2 px-4 py-2 rounded-full bg-gray-100 hover:bg-amber-100 transition-all'
                            }, [
                                React.createElement('span', { key: 'icon' }, '🌐'),
                                React.createElement('span', { 
                                    key: 'text',
                                    className: 'font-medium'
                                }, language === 'ar' ? 'AR/EN' : 'EN/AR')
                            ])
                        ])
                    ])
                ]),

                // Hero Section
                React.createElement('section', {
                    key: 'hero',
                    id: 'home',
                    className: 'relative min-h-screen flex items-center pt-20 overflow-hidden',
                    style: {
                        background: 'linear-gradient(135deg, #1e293b 0%, #334155 50%, #475569 100%)'
                    }
                }, [
                    React.createElement('div', {
                        key: 'hero-bg',
                        className: 'absolute inset-0 opacity-20',
                        style: {
                            backgroundImage: 'url(https://images.unsplash.com/photo-1589829545856-d10d557cf95f?ixlib=rb-4.0.3)',
                            backgroundSize: 'cover',
                            backgroundPosition: 'center'
                        }
                    }),
                    React.createElement('div', {
                        key: 'hero-content',
                        className: 'max-w-7xl mx-auto px-8 relative z-10 w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center'
                    }, [
                        React.createElement('div', {
                            key: 'hero-text',
                            className: 'text-white space-y-8'
                        }, [
                            React.createElement('div', {
                                key: 'badge',
                                className: 'inline-block px-4 py-1 rounded-full bg-amber-500/20 text-amber-200 border border-amber-400/30 text-sm font-medium'
                            }, currentLang.badge),
                            
                            React.createElement('h1', {
                                key: 'title',
                                className: 'text-4xl md:text-6xl lg:text-7xl leading-tight font-bold',
                                style: { fontFamily: 'serif' }
                            }, [
                                currentLang.title,
                                React.createElement('br'),
                                React.createElement('span', {
                                    className: 'text-amber-200'
                                }, currentLang.subtitle)
                            ]),
                            
                            React.createElement('p', {
                                key: 'description',
                                className: 'text-lg md:text-xl text-gray-300 max-w-xl leading-relaxed'
                            }, currentLang.description),
                            
                            React.createElement('div', {
                                key: 'buttons',
                                className: 'flex flex-wrap gap-4'
                            }, [
                                React.createElement('a', {
                                    key: 'cta1',
                                    href: '#contact',
                                    className: 'px-8 py-4 bg-amber-500 text-white rounded-lg font-bold flex items-center gap-3 hover:bg-amber-400 transition-all transform hover:-translate-y-1'
                                }, [
                                    currentLang.cta1,
                                    React.createElement('span', { key: 'icon' }, '⚖️')
                                ]),
                                React.createElement('a', {
                                    key: 'cta2',
                                    href: '#services',
                                    className: 'px-8 py-4 border border-gray-400 text-white rounded-lg font-bold hover:bg-white/10 transition-all'
                                }, currentLang.cta2)
                            ])
                        ]),
                        
                        React.createElement('div', {
                            key: 'hero-image',
                            className: 'relative hidden lg:block'
                        }, [
                            React.createElement('div', {
                                className: 'w-full h-[600px] rounded-2xl overflow-hidden shadow-2xl transform rotate-2 bg-gray-700 flex items-center justify-center'
                            }, [
                                React.createElement('div', {
                                    key: 'placeholder-content',
                                    className: 'text-center text-white'
                                }, [
                                    React.createElement('div', { key: 'icon', className: 'text-6xl mb-4' }, '👨‍⚖️'),
                                    React.createElement('p', { key: 'text', className: 'text-xl' }, 'Professional Portrait')
                                ])
                            ]),
                            React.createElement('div', {
                                key: 'decoration',
                                className: 'absolute -bottom-10 -right-10 w-64 h-64 bg-amber-500 rounded-2xl -z-10 transform -rotate-6'
                            })
                        ])
                    ])
                ]),

                // Services Section
                React.createElement('section', {
                    key: 'services',
                    id: 'services',
                    className: 'py-24 bg-gray-50'
                }, [
                    React.createElement('div', {
                        key: 'services-content',
                        className: 'max-w-7xl mx-auto px-8'
                    }, [
                        React.createElement('div', {
                            key: 'services-header',
                            className: 'text-center mb-16 space-y-4'
                        }, [
                            React.createElement('span', {
                                key: 'services-subtitle',
                                className: 'text-amber-600 font-bold tracking-widest text-sm uppercase'
                            }, language === 'ar' ? 'منهجية العمل' : 'Our Methodology'),
                            React.createElement('h2', {
                                key: 'services-title',
                                className: 'text-4xl font-bold text-gray-800',
                                style: { fontFamily: 'serif' }
                            }, language === 'ar' ? 'الخدمات الجنائية المتخصصة' : 'Specialized Criminal Defense'),
                            React.createElement('div', {
                                key: 'services-line',
                                className: 'w-24 h-1 bg-amber-500 mx-auto mt-4'
                            })
                        ]),
                        
                        React.createElement('div', {
                            key: 'services-grid',
                            className: 'grid grid-cols-1 md:grid-cols-3 gap-8'
                        }, [
                            {
                                icon: '🛡️',
                                title: language === 'ar' ? 'الدفاع في التحقيقات' : 'Investigation Defense',
                                description: language === 'ar' ? 'التمثيل القانوني منذ اللحظة الأولى في مراكز الشرطة والنيابة العامة' : 'Legal representation from first moment at police stations and Public Prosecution'
                            },
                            {
                                icon: '⚖️',
                                title: language === 'ar' ? 'المرافعة الجنائية' : 'Criminal Litigation',
                                description: language === 'ar' ? 'إعداد المذكرات القانونية والمرافعة الشفهية أمام المحاكم' : 'Preparing legal briefs and providing oral arguments before Courts'
                            },
                            {
                                icon: '📚',
                                title: language === 'ar' ? 'النقض والاستئناف' : 'Cassation & Appeal',
                                description: language === 'ar' ? 'دراسة الأحكام وتقديم طعون الاستئناف والنقض' : 'Studying judgments and filing appeals and cassation petitions'
                            }
                        ].map((service, index) => 
                            React.createElement('div', {
                                key: `service-${index}`,
                                className: 'p-8 bg-white rounded-xl shadow-sm border-t-4 border-amber-500 transition-all hover:shadow-lg hover:-translate-y-2'
                            }, [
                                React.createElement('div', {
                                    key: `icon-${index}`,
                                    className: 'text-5xl text-amber-500 mb-6'
                                }, service.icon),
                                React.createElement('h3', {
                                    key: `title-${index}`,
                                    className: 'text-2xl font-bold mb-4 text-gray-800',
                                    style: { fontFamily: 'serif' }
                                }, service.title),
                                React.createElement('p', {
                                    key: `desc-${index}`,
                                    className: 'text-gray-600 leading-relaxed'
                                }, service.description)
                            ])
                        ))
                    ])
                ]),

                // Contact Section
                React.createElement('section', {
                    key: 'contact',
                    id: 'contact',
                    className: 'py-24 bg-white'
                }, [
                    React.createElement('div', {
                        key: 'contact-content',
                        className: 'max-w-7xl mx-auto px-8'
                    }, [
                        React.createElement('div', {
                            key: 'contact-header',
                            className: 'text-center mb-16'
                        }, [
                            React.createElement('h2', {
                                key: 'contact-title',
                                className: 'text-4xl font-bold text-gray-800 mb-4',
                                style: { fontFamily: 'serif' }
                            }, language === 'ar' ? 'اتصل بنا' : 'Contact Us'),
                            React.createElement('p', {
                                key: 'contact-desc',
                                className: 'text-xl text-gray-600'
                            }, language === 'ar' ? 'فريقنا القانوني جاهز لاستقبال استفساراتكم' : 'Our legal team is ready to receive your inquiries')
                        ]),
                        
                        React.createElement('div', {
                            key: 'contact-grid',
                            className: 'grid grid-cols-1 md:grid-cols-3 gap-8'
                        }, [
                            {
                                icon: '📞',
                                title: language === 'ar' ? 'اتصل بنا' : 'Call Us',
                                info: '+971 4 000 0000'
                            },
                            {
                                icon: '✉',
                                title: language === 'ar' ? 'البريد الإلكتروني' : 'Email',
                                info: 'info@alablam.ae'
                            },
                            {
                                icon: '📍',
                                title: language === 'ar' ? 'الموقع' : 'Location',
                                info: language === 'ar' ? 'دبي، الإمارات العربية المتحدة' : 'Dubai, UAE'
                            }
                        ].map((item, index) => 
                            React.createElement('div', {
                                key: `contact-${index}`,
                                className: 'text-center'
                            }, [
                                React.createElement('div', {
                                    key: `icon-${index}`,
                                    className: 'text-4xl text-amber-500 mb-4'
                                }, item.icon),
                                React.createElement('h3', {
                                    key: `title-${index}`,
                                    className: 'font-bold text-gray-800 mb-2'
                                }, item.title),
                                React.createElement('p', {
                                    key: `info-${index}`,
                                    className: 'text-gray-600'
                                }, item.info)
                            ])
                        ))
                    ])
                ]),

                // Footer
                React.createElement('footer', {
                    key: 'footer',
                    className: 'bg-gray-900 text-white py-12 px-8'
                }, [
                    React.createElement('div', {
                        key: 'footer-content',
                        className: 'max-w-7xl mx-auto text-center'
                    }, [
                        React.createElement('div', {
                            key: 'footer-logo',
                            className: 'flex items-center justify-center gap-3 text-lg font-bold mb-4',
                            style: { fontFamily: 'serif' }
                        }, [
                            React.createElement('img', {
                                key: 'footer-logo-img',
                                src: 'https://i.ibb.co/7bQ2GqM/logo-01.png',
                                alt: 'Alablam Logo',
                                className: 'h-12 w-auto object-contain',
                                style: { maxHeight: '48px' }
                            }),
                            React.createElement('span', { key: 'footer-title' }, currentLang.title)
                        ]),
                        React.createElement('p', {
                            key: 'footer-desc',
                            className: 'text-gray-400 mb-4'
                        }, language === 'ar' ? 'مكتب محاماة رائد في دولة الإمارات العربية المتحدة' : 'A leading law firm in United Arab Emirates'),
                        React.createElement('p', {
                            key: 'footer-copyright',
                            className: 'text-gray-500 text-sm'
                        }, `© 2024 ${currentLang.title} ${currentLang.subtitle}. All Rights Reserved.`)
                    ])
                ])
            ]);
        }

        // Render the app
        ReactDOM.render(React.createElement(SimpleApp), document.getElementById('app'));
    </script>
</body>
</html>
